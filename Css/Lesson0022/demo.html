<!DOCTYPE html>
<!-- Đây là dòng khai báo tài liệu HTML5 -->
<html>
<!-- Thẻ html là thẻ gốc của tài liệu HTML -->
<head>
    <!-- Thẻ head chứa thông tin về tài liệu -->
    <title>Tạo hình ảnh nền động</title>
    <!-- Tiêu đề của trang web -->
    <link rel="stylesheet" type="text/css" href="Lesson0022.css">
    <!-- Liên kết đến file CSS -->
</head>
<body>
    <!-- Thẻ body chứa nội dung của trang web -->
    <div class="container">
        <!-- Tạo một div chứa nội dung -->
        <h1>Hình ảnh nền động</h1>
        <!-- Tiêu đề của trang web -->
        <p>Hình ảnh nền động được tạo bằng CSS, giúp trang web trở nên sinh động và thu hút hơn.</p>
        <!-- Đoạn văn bản mô tả -->
        <div class="background"></div>
        <!-- Tạo một div để chứa hình ảnh nền động -->
    </div>
</body>
</html>
