<!DOCTYPE html>
<!-- Đây là tài liệu HTML5 -->
<html lang="vi">
<!-- Ngôn ngữ của tài liệu là tiếng Việt -->
<head>
    <!-- Phần đầu của tài liệu, chứa thông tin về tài liệu -->
    <meta charset="UTF-8">
    <!-- Mã hóa ký tự sử dụng trong tài liệu là UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cài đặt kích thước và tỷ lệ của trang web trên thiết bị di động -->
    <title>Tìm hiểu về Accessibility trong CSS</title>
    <!-- Tiêu đề của trang web -->
    <link rel="stylesheet" href="Lesson0021.css">
    <!-- Liên kết đến file CSS -->
</head>
<body>
    <!-- Phần nội dung của tài liệu -->
    <header>
        <!-- Phần đầu của trang web, chứa thông tin về trang web -->
        <nav>
            <!-- Menu điều hướng của trang web -->
            <ul>
                <!-- Danh sách các mục trong menu -->
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Giới thiệu</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- Phần nội dung chính của trang web -->
        <section>
            <!-- Phần nội dung của trang web, chứa thông tin về một chủ đề cụ thể -->
            <h1>Tìm hiểu về Accessibility trong CSS</h1>
            <!-- Tiêu đề của phần nội dung -->
            <p>Accessibility là khả năng truy cập của trang web, giúp người dùng có thể sử dụng trang web một cách dễ dàng và hiệu quả.</p>
            <!-- Đoạn văn bản của phần nội dung -->
            <button>Bấm vào đây</button>
            <!-- Nút bấm -->
            <img src="image.jpg" alt="Hình ảnh mẫu">
            <!-- Hình ảnh -->
            <form>
                <!-- Biểu mẫu -->
                <label for="name">Tên:</label>
                <!-- Nhãn của trường nhập liệu -->
                <input type="text" id="name" name="name">
                <!-- Trường nhập liệu -->
                <label for="email">Địa chỉ email:</label>
                <!-- Nhãn của trường nhập liệu -->
                <input type="email" id="email" name="email">
                <!-- Trường nhập liệu -->
                <button>Gửi</button>
                <!-- Nút bấm gửi biểu mẫu -->
            </form>
        </section>
    </main>
    <footer>
        <!-- Phần chân của trang web, chứa thông tin về trang web -->
        <p>&copy; 2024 Tìm hiểu về Accessibility trong CSS</p>
        <!-- Thông tin về bản quyền -->
    </footer>
</body>
</html>
