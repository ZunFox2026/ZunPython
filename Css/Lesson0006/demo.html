<!DOCTYPE html>
<!-- Đây là phần khai báo loại tài liệu -->
<html>
<!-- Root element của tài liệu HTML -->
<head>
    <!-- Phần chứa thông tin về tài liệu -->
    <title>Tạo hình dạng hình học với CSS</title>
    <!-- Tiêu đề của trang web -->
    <link rel="stylesheet" type="text/css" href="Lesson0006.css">
    <!-- Liên kết đến file CSS -->
</head>
<body>
    <!-- Phần chứa nội dung của trang web -->
    <h1>Tạo hình dạng hình học với CSS</h1>
    <!-- Tiêu đề chính của trang web -->
    <div class="hinh-vuong">
        <!-- Một div để tạo hình vuông -->
        Hình vuông
    </div>
    <div class="hinh-tron">
        <!-- Một div để tạo hình tròn -->
        Hình tròn
    </div>
    <div class="hinh-chu-nhat">
        <!-- Một div để tạo hình chữ nhật -->
        Hình chữ nhật
    </div>
    <div class="hinh-thoi">
        <!-- Một div để tạo hình thoi -->
        Hình thoi
    </div>
    <div class="hinh-luc-giac">
        <!-- Một div để tạo hình lục giác -->
        Hình lục giác
    </div>
    <div class="hinh-bat-giac">
        <!-- Một div để tạo hình bát giác -->
        Hình bát giác
    </div>
</body>
</html>
