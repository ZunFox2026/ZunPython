<!DOCTYPE html>
<html>
<head>
    <!-- Phần đầu của trang web, chứa thông tin về trang -->
    <title>Tạo hiệu ứng Parallax</title>
    <style>
        /* CSS cho hiệu ứng Parallax */
        .background {
            /* Tạo lớp nền cho hiệu ứng Parallax */
            background-image: url('https://picsum.photos/2000/1000');
            background-attachment: fixed; /* Đính kèm hình nền vào viewport */
            background-size: cover; /* Đặt kích thước hình nền */
            height: 100vh; /* Đặt chiều cao cho lớp nền */
            display: flex; /* Sử dụng flexbox để căn giữa nội dung */
            justify-content: center; /* Căn giữa nội dung theo chiều ngang */
            align-items: center; /* Căn giữa nội dung theo chiều dọc */
            color: #fff; /* Màu sắc của chữ */
        }
        
        .foreground {
            /* Tạo lớp foreground cho hiệu ứng Parallax */
            background-image: url('https://picsum.photos/2000/1001');
            background-attachment: fixed; /* Đính kèm hình nền vào viewport */
            background-size: cover; /* Đặt kích thước hình nền */
            height: 100vh; /* Đặt chiều cao cho lớp foreground */
            display: flex; /* Sử dụng flexbox để căn giữa nội dung */
            justify-content: center; /* Căn giữa nội dung theo chiều ngang */
            align-items: center; /* Căn giữa nội dung theo chiều dọc */
            color: #fff; /* Màu sắc của chữ */
            margin-top: 100vh; /* Đặt khoảng cách giữa hai lớp */
        }
        
        .content {
            /* Tạo lớp nội dung cho hiệu ứng Parallax */
            background-color: rgba(0, 0, 0, 0.5); /* Tạo lớp che để nhìn rõ nội dung */
            padding: 20px; /* Đặt khoảng cách giữa nội dung và lớp che */
            border-radius: 10px; /* Tạo hình tròn cho lớp che */
        }
    </style>
</head>
<body>
    <!-- Phần nội dung của trang web -->
    <div class="background">
        <div class="content">
            <!-- Nội dung lớp background -->
            <h1>Hiệu ứng Parallax</h1>
            <p>Đây là lớp background với hiệu ứng Parallax</p>
        </div>
    </div>
    <div class="foreground">
        <div class="content">
            <!-- Nội dung lớp foreground -->
            <h1>Hiệu ứng Parallax</h1>
            <p>Đây là lớp foreground với hiệu ứng Parallax</p>
        </div>
    </div>
</body>
</html>
