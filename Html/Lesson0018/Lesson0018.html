<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html lang="vi">
<!-- Thẻ html bao quanh toàn bộ tài liệu -->
<head>
    <!-- Thẻ head chứa thông tin về tài liệu -->
    <meta charset="UTF-8">
    <!-- Định nghĩa bộ ký tự sử dụng trong tài liệu -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Định nghĩa kích thước và tỉ lệ của trang web trên thiết bị di động -->
    <title>Tạo hiệu ứng Parallax</title>
    <!-- Tiêu đề của trang web -->
    <style>
        /* CSS viết trong thẻ style */
        body {
            /* Định dạng cho toàn bộ trang web */
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            /* Loại font sử dụng trong trang web */
        }
        .parallax {
            /* Lớp parallax chứa ảnh nền */
            background-image: url('https://picsum.photos/2000/1000');
            /* Đường dẫn đến ảnh nền */
            background-attachment: fixed;
            /* Hiệu ứng parallax: ảnh nền cố định khi cuộn trang */
            background-size: cover;
            /* Ảnh nền phủ đầy khu vực */
            height: 100vh;
            /* Chiều cao của khu vực parallax là 100% chiều cao của màn hình */
            display: flex;
            /* Sử dụng flexbox để căn giữa nội dung */
            justify-content: center;
            /* Căn giữa nội dung theo trục ngang */
            align-items: center;
            /* Căn giữa nội dung theo trục dọc */
            color: #fff;
            /* Màu sắc của văn bản */
        }
        .noi-dung {
            /* Lớp chứa nội dung */
            background-color: rgba(0, 0, 0, 0.5);
            /* Màu nền trong suốt để nhìn rõ nội dung */
            padding: 20px;
            /* Khoảng cách giữa nội dung và biên giới */
            border-radius: 10px;
            /* Bo góc cho lớp chứa nội dung */
        }
    </style>
</head>
<body>
    <!-- Thẻ body chứa nội dung của trang web -->
    <div class="parallax">
        <!-- Lớp parallax chứa ảnh nền và nội dung -->
        <div class="noi-dung">
            <!-- Lớp chứa nội dung -->
            <h1>Tạo hiệu ứng Parallax</h1>
            <!-- Tiêu đề của trang web -->
            <p>Hiệu ứng parallax là một kỹ thuật thiết kế web tạo ra cảm giác sâu và động cho trang web.</p>
            <!-- Nội dung của trang web -->
        </div>
    </div>
    <div style="height: 1000px; background-color: #f0f0f0;">
        <!-- Một khu vực khác để chứng minh hiệu ứng parallax -->
    </div>
</body>
</html>
