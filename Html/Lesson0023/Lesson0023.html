<!DOCTYPE html>
<html>
<head>
    <!-- Phần khai báo và liên kết đến các file CSS, JS, ảnh, font -->
    <title>Tạo hiệu ứng Loading</title>
    <style>
        /* Phần CSS để tạo kiểu cho trang web */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 10px solid #ccc;
            border-top: 10px solid #3498db;
            border-radius: 50%;
            animation: loading 1s linear infinite;
        }
        
        @keyframes loading {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        
        .text {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: bold;
            color: #3498db;
        }
    </style>
</head>
<body>
    <!-- Phần nội dung chính của trang web -->
    <!-- Tạo hiệu ứng Loading -->
    <div class="loading"></div>
    <div class="text">Đang tải...</div>
</body>
</html>
