<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html>
<!-- Root element của tài liệu HTML -->
<head>
    <!-- Phần đầu của tài liệu, chứa thông tin về trang web -->
    <title>Trang Web Về Du Lịch</title>
    <!-- Tiêu đề của trang web, hiển thị trên thanh tiêu đề của trình duyệt -->
    <style>
        /* CSS được viết trong thẻ style */
        body {
            /* Style cho phần body của trang web */
            background-color: #f2f2f2; /* Màu nền */
            font-family: Arial, sans-serif; /* Font chữ */
        }
        
        .header {
            /* Style cho phần header */
            background-color: #007bff; /* Màu nền */
            color: #ffffff; /* Màu chữ */
            padding: 20px; /* Khoảng cách trong */
            text-align: center; /* Căn giữa */
        }
        
        .content {
            /* Style cho phần nội dung */
            max-width: 800px; /* Chiều rộng tối đa */
            margin: 40px auto; /* Khoảng cách và căn giữa */
            padding: 20px; /* Khoảng cách trong */
            background-color: #ffffff; /* Màu nền */
            border: 1px solid #dddddd; /* Đường viền */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Hiệu ứng bóng */
        }
        
        .footer {
            /* Style cho phần footer */
            background-color: #007bff; /* Màu nền */
            color: #ffffff; /* Màu chữ */
            padding: 10px; /* Khoảng cách trong */
            text-align: center; /* Căn giữa */
        }
    </style>
</head>
<body>
    <!-- Phần thân của trang web -->
    <div class="header">
        <!-- Phần header của trang web -->
        <h1>Trang Web Về Du Lịch</h1>
        <!-- Tiêu đề của trang web -->
    </div>
    <div class="content">
        <!-- Phần nội dung của trang web -->
        <h2>Khám phá thế giới</h2>
        <!-- Tiêu đề của phần nội dung -->
        <p>Chào mừng bạn đến với trang web về du lịch của chúng tôi. Tại đây, bạn sẽ tìm thấy thông tin về các địa điểm du lịch hấp dẫn trên toàn thế giới.</p>
        <!-- Nội dung của phần nội dung -->
        <img src="https://via.placeholder.com/400x200" alt="Hình ảnh du lịch">
        <!-- Hình ảnh minh họa -->
    </div>
    <div class="footer">
        <!-- Phần footer của trang web -->
        <p>&copy; 2024 Trang Web Về Du Lịch</p>
        <!-- Thông tin bản quyền -->
    </div>
</body>
</html>
