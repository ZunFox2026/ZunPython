<!DOCTYPE html>
<html>
<head>
    <!-- Thông tin về trang web -->
    <title>Tạo hiệu ứng loading</title>
    <style>
        /* CSS cho hiệu ứng loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 10px solid #f3f3f3;
            border-top: 10px solid #3498db;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* CSS cho nền và màu sắc */
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #3498db;
        }
    </style>
</head>
<body>
    <!-- Tiêu đề trang web -->
    <h1>Hiệu ứng loading</h1>
    <!-- Hiệu ứng loading -->
    <div class="loading"></div>
    <!-- Giải thích về hiệu ứng loading -->
    <p>Hiệu ứng loading được tạo ra bằng cách sử dụng CSS animation và transform.</p>
</body>
</html>
