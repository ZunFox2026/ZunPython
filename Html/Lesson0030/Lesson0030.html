<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu, thông báo cho trình duyệt rằng đây là một trang web sử dụng HTML5 -->
<html>
<!-- Đây là thẻ gốc của tài liệu HTML -->
<head>
    <!-- Phần này chứa thông tin về trang web, như tiêu đề, phong cách, và các tệp tin khác được liên kết -->
    <title>Tạo hiệu ứng loading</title>
    <!-- Tiêu đề của trang web, hiển thị trên tab trình duyệt -->
    <style>
        /* Đây là phần viết CSS, dùng để tạo phong cách cho trang web */
        body {
            /* Thiết lập phong cách cho phần thân của trang web */
            font-family: Arial, sans-serif;
            /* Chọn font chữ cho trang web */
            background-color: #f0f0f0;
            /* Màu nền của trang web */
        }
        
        .loading {
            /* Tạo lớploading để chứa hiệu ứng loading */
            position: absolute;
            /* Vị trí tuyệt đối, giúp lớp này không bị ảnh hưởng bởi phần tử khác */
            top: 50%;
            /* Vị trí từ đầu trang web */
            left: 50%;
            /* Vị trí từ trái trang web */
            transform: translate(-50%, -50%);
            /* Dịch chuyển lớp này lên trên và trái để nó nằm chính giữa trang web */
            font-size: 24px;
            /* Kích thước chữ */
            color: #333;
            /* Màu chữ */
        }
        
        .loading::before {
            /* Tạo hiệu ứng loading trước lớploading */
            content: "";
            /* Nội dung của hiệu ứng loading */
            position: absolute;
            /* Vị trí tuyệt đối */
            top: 50%;
            /* Vị trí từ đầu trang web */
            left: 50%;
            /* Vị trí từ trái trang web */
            transform: translate(-50%, -50%);
            /* Dịch chuyển lớp này lên trên và trái để nó nằm chính giữa trang web */
            border: 10px solid #ccc;
            /* Đường viền của hiệu ứng loading */
            border-top-color: #333;
            /* Màu của đường viền trên */
            border-radius: 50%;
            /* Bán kính của đường viền */
            width: 50px;
            /* Chiều rộng của hiệu ứng loading */
            height: 50px;
            /* Chiều cao của hiệu ứng loading */
            animation: loading 1s linear infinite;
            /* Hiệu ứng loading, lặp lại sau mỗi giây */
        }
        
        @keyframes loading {
            /* Khung hình của hiệu ứng loading */
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Phần thân của trang web -->
    <div class="loading">Loading...</div>
    <!-- Lớploading, chứa hiệu ứng loading -->
</body>
</html>
