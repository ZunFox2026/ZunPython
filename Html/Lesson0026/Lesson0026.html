<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html>
<!-- Phần head chứa thông tin về trang web, không được hiển thị trực tiếp trên trang -->
<head>
    <!-- Thẻ tiêu đề của trang web -->
    <title>Tạo hiệu ứng Parallax</title>
    <!-- Thẻ meta để quy định bộ ký tự cho trang web -->
    <meta charset="UTF-8">
    <!-- Thẻ meta để quy định cách hiển thị trang web trên các thiết bị di động -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Thẻ style để thêm CSS nội tuyến vào trang web -->
    <style>
        /* Hiệu ứng Parallax hoạt động bằng cách sử dụng thuộc tính background-attachment: fixed; */
        .parallax {
            /* Đặt chiều cao cho lớp Parallax */
            height: 100vh;
            /* Đặt hình nền và hiệu ứng cố định */
            background-image: url('https://picsum.photos/2000/1000');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            /* Thêm màu nền và độ trong suốt */
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        /* Tạo lớp nội dung để minh họa hiệu ứng Parallax */
        .content {
            /* Đặt chiều cao và màu nền cho lớp nội dung */
            height: 100vh;
            background-color: #f0f0f0;
            /* Đặt padding và màu văn bản */
            padding: 20px;
            color: #333;
            /* Đặt font và cỡ chữ */
            font-family: Arial, sans-serif;
            font-size: 18px;
        }
        
        /* Thêm màu nền và hiệu ứng cho các lớp nội dung tiếp theo */
        .content2 {
            background-color: #ccc;
            padding: 20px;
            color: #666;
            font-family: Arial, sans-serif;
            font-size: 18px;
        }
        
        .parallax2 {
            height: 100vh;
            background-image: url('https://picsum.photos/2000/1001');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<!-- Phần body chứa nội dung của trang web -->
<body>
    <!-- Tạo lớp Parallax đầu tiên -->
    <div class="parallax">
        <!-- Thêm lớp nội dung vào lớp Parallax -->
        <div class="content">
            <h1>Hiệu ứng Parallax</h1>
            <p>Đây là lớp nội dung trong hiệu ứng Parallax đầu tiên.</p>
        </div>
    </div>
    <!-- Tạo lớp nội dung thứ hai -->
    <div class="content2">
        <h1>Nội dung thứ hai</h1>
        <p>Đây là lớp nội dung thứ hai.</p>
    </div>
    <!-- Tạo lớp Parallax thứ hai -->
    <div class="parallax2">
        <!-- Thêm lớp nội dung vào lớp Parallax thứ hai -->
        <div class="content">
            <h1>Hiệu ứng Parallax thứ hai</h1>
            <p>Đây là lớp nội dung trong hiệu ứng Parallax thứ hai.</p>
        </div>
    </div>
</body>
</html>
