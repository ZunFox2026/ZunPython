<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu, bắt đầu của một trang HTML -->
<html>
<!-- Thẻ gốc của tài liệu HTML -->
<head>
    <!-- Phần đầu của tài liệu, chứa thông tin về trang web -->
    <title>Tạo hiệu ứng loading</title>
    <!-- Tiêu đề của trang web, hiển thị trên thanh tiêu đề của trình duyệt -->
    <style>
        /* Đây là phần CSS, dùng để tạo kiểu và thiết kế cho trang web */
        body {
            /* Thiết lập màu nền và phông chữ cho trang web */
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }
        
        .loading {
            /* Tạo kiểu cho phần loading */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 10px solid #3498db;
            border-top: 10px solid #ffffff;
            border-radius: 50%;
            animation: loading 1s linear infinite;
        }
        
        @keyframes loading {
            /* Tạo hiệu ứng animation cho phần loading */
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Phần nội dung của trang web -->
    <div class="loading"></div>
    <!-- Đây là phần loading, sẽ được tạo hiệu ứng bằng CSS -->
    <h1 style="text-align: center; margin-top: 120px;">Tạo hiệu ứng loading</h1>
    <!-- Tiêu đề của trang web, được hiển thị dưới phần loading -->
</body>
</html>
